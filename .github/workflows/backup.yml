name: Backup Base de Datos

on:
  schedule:
    - cron: '0 7 * * *'   # Cada día a las 2am Colombia (UTC-5 → 7am UTC)
  workflow_dispatch:       # También ejecutable manualmente desde GitHub Actions

jobs:
  backup:
    name: pg_dump → artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Instalar cliente PostgreSQL 17
        run: |
          sudo apt-get install -y gnupg2 curl lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/postgresql.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          echo "Versión instalada: $(/usr/lib/postgresql/17/bin/pg_dump --version)"

      - name: Generar nombre del archivo
        id: nombre
        run: |
          FECHA=$(date -u +"%Y-%m-%d_%H-%M")
          echo "archivo=movilidad_backup_${FECHA}.dump" >> $GITHUB_OUTPUT
          echo "fecha=$FECHA" >> $GITHUB_OUTPUT

      - name: Ejecutar pg_dump
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump \
            --dbname="$SUPABASE_DB_URL" \
            --format=custom \
            --no-acl \
            --no-owner \
            --compress=9 \
            --file="${{ steps.nombre.outputs.archivo }}"

      - name: Verificar tamaño del backup
        run: |
          SIZE=$(du -sh "${{ steps.nombre.outputs.archivo }}" | cut -f1)
          echo "✅ Backup generado: ${{ steps.nombre.outputs.archivo }} ($SIZE)"

      - name: Subir como artifact (retención 90 días)
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ steps.nombre.outputs.fecha }}
          path: ${{ steps.nombre.outputs.archivo }}
          retention-days: 90
          if-no-files-found: error

      - name: Notificar fallo
        if: failure()
        run: |
          echo "❌ El backup falló el $(date -u). Revisar logs en GitHub Actions." >&2
          exit 1
